<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudiemos</title>
    <script src="./scripts/theme-init.js?v=20260628-root-history"></script>
    <link rel="stylesheet" href="./styles/app.css?v=20260714-focus-mode-soft" />
  </head>

  <body>
    <header class="topbar">
      <a class="brand" href="./">
        <span class="brand__text">Estudiemos</span>
      </a>

      <nav class="topbar__nav" aria-label="Navegacion principal">
        <a class="topbar__link" href="./about.html">Acerca de</a>
        <a class="topbar__focus-link" href="https://ipala2006-maker.github.io/estudiemos-room/" target="_blank" rel="noopener noreferrer">modo enfoque</a>
      </nav>
    </header>

    <main class="container">

      <section class="hero">
        <h1>Estudiemos</h1>
      </section>

      <section class="section">
        <div class="section__head">
          <h2>Carreras</h2>
          <p class="section__hint">Haz clic para ver las materias.</p>
        </div>

        <div id="materiasGrid" class="cards-grid">
          <div class="loading-placeholder">Cargando carreras...</div>
        </div>
      </section>

      <footer class="footer">
        <span>Â© <span id="year"></span> Estudiemos</span>
      </footer>

    </main>

    <!-- DATA SIEMPRE PRIMERO -->
    <script src="./data/data.js"></script>
    <script src="./scripts/global-search.js?v=20260628-mobile-tray"></script>

    <script>
      const grid = document.getElementById("materiasGrid");

      const data = DATA.carreras;

      grid.innerHTML = data.map(m => `
        <a class="card" href="./pages/carrera/${m.slug}.html">
          <div class="card__body">
            <h3 class="card__title">${m.title}</h3>
            <p class="card__desc">${m.description}</p>
          </div>
        </a>
      `).join("");
    </script>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>

  </body>
</html>
