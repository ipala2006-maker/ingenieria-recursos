name: Diario Ian

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read
  issues: write

jobs:
  revisar-diario:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Revisar DIARIO.md y abrir issue de trabajo
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = "diario-ian";
            const codexLabel = "codex";
            const title = "Diario Ian: tareas pendientes";

            function ensureLabel(name, color, description) {
              return github.rest.issues.getLabel({ owner, repo, name })
                .catch(async (error) => {
                  if (error.status !== 404) throw error;
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                });
            }

            if (!fs.existsSync("DIARIO.md")) {
              core.info("DIARIO.md no existe. No se crea issue.");
              return;
            }

            const diario = fs.readFileSync("DIARIO.md", "utf8").trim();
            const tareasMatch = diario.match(/##\s*Tareas\s*\n([\s\S]*)/i);
            const tareas = (tareasMatch ? tareasMatch[1] : diario)
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
              .filter((line) => !/^\[?\s*(sin tareas|no hay tareas|pendiente)\s*\]?$/i.test(line));

            if (tareas.length === 0) {
              core.info("DIARIO.md no contiene tareas claras. No se crea issue.");
              return;
            }

            await ensureLabel(labelName, "0e8a16", "Tareas detectadas automaticamente desde DIARIO.md");
            await ensureLabel(codexLabel, "1d76db", "Trabajo sugerido para Codex");

            const body = [
              "GitHub Actions encontro tareas en `DIARIO.md`.",
              "",
              "Este issue permite trabajar desde GitHub sin depender de que la PC local este prendida.",
              "",
              "## Tareas detectadas",
              ...tareas.map((line) => `- ${line.replace(/^[-*]\s*/, "")}`),
              "",
              "## Instrucciones para Codex",
              "- Leer `DIARIO.md` en `main` antes de cambiar archivos.",
              "- Ejecutar solo tareas claras relacionadas con mejorar la pagina/proyecto.",
              "- Hacer cambios chicos, seguros y reversibles.",
              "- No tocar `DATA.js` salvo que la tarea lo pida o sea necesario para un bug concreto.",
              "- Si el cambio toca arquitectura, dependencias, configuracion, autenticacion, base de datos, rutas importantes o muchas partes del proyecto, abrir Pull Request.",
              "- Si es simple y de bajo riesgo, se puede commitear directo a `main`.",
              "- Antes de subir cambios, ejecutar los checks disponibles.",
              "",
              `Generado por workflow: ${context.workflow}`,
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 20,
            });

            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);

            if (existing) {
              if (existing.body !== body) {
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
                core.info(`Issue actualizado: #${existing.number}`);
              } else {
                core.info(`Issue existente sin cambios: #${existing.number}`);
              }
              return;
            }

            const { data: issue } = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: [labelName, codexLabel],
            });

            core.info(`Issue creado: #${issue.number}`);
