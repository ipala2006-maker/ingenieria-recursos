name: Mobile Tasks Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: mobile-tasks-runner
  cancel-in-progress: false

jobs:
  process-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process TASKS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/mobile-tasks-runner.mjs

      - name: Commit TASKS.md status changes
        run: |
          if git diff --quiet -- TASKS.md; then
            echo "No TASKS.md changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TASKS.md
          git commit -m "Actualizar estados de tareas moviles"
          git pull --rebase origin main
          git push origin HEAD:main
