name: Codex Apply Focus Mode Native Nav Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch focus mode button style
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          index = Path("index.html")
          html = index.read_text(encoding="utf-8")
          html = html.replace("./styles/app.css?v=20260714-focus-mode-soft", "./styles/app.css?v=20260714-focus-mode-native")
          html = html.replace("<a class=\"topbar__focus-link\" href=\"https://ipala2006-maker.github.io/estudiemos-room/\" target=\"_blank\" rel=\"noopener noreferrer\">modo enfoque</a>", "<a class=\"topbar__link\" href=\"https://ipala2006-maker.github.io/estudiemos-room/\" target=\"_blank\" rel=\"noopener noreferrer\">modo enfoque</a>")
          index.write_text(html, encoding="utf-8")
          css_path = Path("styles/app.css")
          css = css_path.read_text(encoding="utf-8")
          css = re.sub(r"\.topbar__focus-link\{.*?\}\n\.topbar__focus-link:hover\{.*?\}\n\.topbar__focus-link:focus-visible\{.*?\}\n\n", "", css, flags=re.S)
          css = css.replace("  .topbar__focus-link{\n    min-height:38px;\n    padding:9px 12px;\n  }\n\n", "")
          css = re.sub(r"html\.theme-light \.topbar__focus-link\{.*?\}\n\nhtml\.theme-light \.topbar__focus-link:hover\{.*?\}\n\n", "", css, flags=re.S)
          css_path.write_text(css, encoding="utf-8")
          PY
          git config user.name "codex-agent"
          git config user.email "codex-agent@users.noreply.github.com"
          git add index.html styles/app.css
          git rm --ignore-unmatch .github/workflows/codex-apply-focus-mode-native-inline.yml
          git status --short
          git commit -m "style: use native nav style for focus mode" || exit 0
          git push
