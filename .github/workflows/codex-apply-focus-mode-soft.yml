name: Apply focus mode soft button payload

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: codex-focus-mode-soft-apply
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Download payload
        run: |
          curl -L --fail --retry 3 --output payload.tgz "https://tmpfiles.org/dl/1784054895.6f1e81f65bdc9507/w6wf1c19dKbX/focus-mode-soft-target.tgz"
          tar -tzf payload.tgz

      - name: Apply files and remove temporary workflow
        run: |
          tar -xzf payload.tgz
          git add index.html styles/app.css
          git rm --ignore-unmatch .github/workflows/codex-apply-focus-mode-soft.yml
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git commit -m "style: soften focus mode button"
          git push origin HEAD:main
