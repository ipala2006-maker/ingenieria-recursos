<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Análisis Matemático I</title>
    <script src="../../scripts/theme-init.js?v=20260628-fluid-nav"></script>
    <link rel="stylesheet" href="../../styles/app.css?v=20260628-mobile-tray" />
  </head>

  <body>

    <header class="topbar">
      <a class="brand" href="../../">
        <span class="brand__text">Estudiemos</span>
      </a>
    </header>

    <main class="container">

      <div class="breadcrumbs" id="breadcrumbs"></div>

      <section class="section">

        <div class="section__head">
          <h2 id="materiaTitle">Análisis Matemático I</h2>
          <p id="materiaDesc" class="section__hint">Límites, derivadas e integrales.</p>
        </div>

        <div id="topicsGrid" class="topic-grid">
          <a class="topic-card" href="../tema/limites.html"><div><p class="topic-card__title">Límites</p><div class="topic-card__meta">Base para cálculo</div></div></a>
          <a class="topic-card" href="../tema/continuidad.html"><div><p class="topic-card__title">Continuidad</p><div class="topic-card__meta">Propiedades</div></div></a>
          <a class="topic-card" href="../tema/derivadas.html"><div><p class="topic-card__title">Derivadas</p><div class="topic-card__meta">Tasa de cambio</div></div></a>
          <a class="topic-card" href="../tema/integrales.html"><div><p class="topic-card__title">Integrales</p><div class="topic-card__meta">Acumulación</div></div></a>
          <a class="topic-card" href="../tema/sucesiones.html"><div><p class="topic-card__title">Sucesiones</p><div class="topic-card__meta">Convergencia</div></div></a>
          <a class="topic-card" href="../tema/series.html"><div><p class="topic-card__title">Series</p><div class="topic-card__meta">Sumatorias</div></div></a>
        </div>

      </section>

    </main>

    <!-- DATA -->
    <script src="../../data/data.js"></script>
    <script src="../../scripts/global-search.js?v=20260628-mobile-tray"></script>

    <script>
      const pathParts = location.pathname.split("/").filter(Boolean);
      const slug = pathParts[pathParts.length - 1].replace(".html", "");

      let materiaFound = null;

      for (const carrera of DATA.carreras) {
        for (const materia of carrera.materias) {
          if (materia.slug === slug) {
            materiaFound = materia;
            break;
          }
        }
      }

      if (!materiaFound) {
        document.body.innerHTML = "<h1>Materia no encontrada</h1>";
      } else {

        const title = document.getElementById("materiaTitle");
        const desc = document.getElementById("materiaDesc");
        if (title.textContent.trim() === "Materia") title.textContent = materiaFound.title;
        if (!desc.textContent.trim()) desc.textContent = materiaFound.description;

        const grid = document.getElementById("topicsGrid");

        if (!grid.querySelector(".topic-card")) {
          grid.innerHTML = materiaFound.temas.map(t => `
            <a class="topic-card" href="../tema/${t.slug}.html">
              <div>
                <p class="topic-card__title">${t.title}</p>
                <div class="topic-card__meta">${t.meta}</div>
              </div>
            </a>
          `).join("");
        }

      }
    </script>

  </body>
</html>
