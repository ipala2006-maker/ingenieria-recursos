<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrera</title>
    <script src="../../scripts/theme-init.js?v=20260627-3"></script>
    <link rel="stylesheet" href="../../styles/app.css?v=20260627-card-compact" />
  </head>

  <body>

    <header class="topbar">
      <a class="brand" href="../../">
        <span class="brand__text">Estudiemos</span>
      </a>
    </header>

    <main class="container">

      <div class="breadcrumbs" id="breadcrumbs"></div>

      <section class="section">

        <div class="section__head">
          <h2 id="carreraTitle">Carrera</h2>
          <p id="carreraDesc" class="section__hint"></p>
        </div>

        <div id="materiasGrid" class="cards-grid">
          <div class="loading-placeholder">Cargando materias...</div>
        </div>

      </section>

    </main>

    <!-- DATA -->
    <script src="../../data/data.js"></script>
    <script src="../../scripts/global-search.js?v=20260627-theme"></script>

    <script>
      const pathParts = location.pathname.split("/").filter(Boolean);
      const slug = pathParts[pathParts.length - 1].replace(".html", "");

      const carrera = DATA.carreras.find(c => c.slug === slug);

      if (!carrera) {
        document.body.innerHTML = "<h1>Carrera no encontrada</h1>";
      } else {

        document.getElementById("carreraTitle").textContent = carrera.title;
        document.getElementById("carreraDesc").textContent = carrera.description;

        const grid = document.getElementById("materiasGrid");

        grid.innerHTML = carrera.materias.map(m => `
          <a class="card" href="../materia/${m.slug}.html">
            <div class="card__body">
              <h3 class="card__title">${m.title}</h3>
              <p class="card__desc">${m.description}</p>
            </div>
          </a>
        `).join("");

      }
    </script>

  </body>
</html>
