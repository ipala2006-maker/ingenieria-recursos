<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingeniería</title>
    <script src="../../scripts/theme-init.js?v=20260628-fluid-nav"></script>
    <link rel="stylesheet" href="../../styles/app.css?v=20260627-tray-stable" />
  </head>

  <body>

    <header class="topbar">
      <a class="brand" href="../../">
        <span class="brand__text">Estudiemos</span>
      </a>
    </header>

    <main class="container">

      <div class="breadcrumbs" id="breadcrumbs"></div>

      <section class="section">

        <div class="section__head">
          <h2 id="carreraTitle">Ingeniería</h2>
          <p id="carreraDesc" class="section__hint">Carrera de ingeniería.</p>
        </div>

        <div id="materiasGrid" class="cards-grid">
          <a class="card" href="../materia/analisis-matematico-1.html">
            <div class="card__body">
              <h3 class="card__title">Análisis Matemático I</h3>
              <p class="card__desc">Límites, derivadas e integrales.</p>
            </div>
          </a>
          <a class="card" href="../materia/fisica-1.html">
            <div class="card__body">
              <h3 class="card__title">Física I</h3>
              <p class="card__desc">Mecánica y termodinámica.</p>
            </div>
          </a>
        </div>

      </section>

    </main>

    <!-- DATA -->
    <script src="../../data/data.js"></script>
    <script src="../../scripts/global-search.js?v=20260628-fluid-nav"></script>

    <script>
      const pathParts = location.pathname.split("/").filter(Boolean);
      const slug = pathParts[pathParts.length - 1].replace(".html", "");

      const carrera = DATA.carreras.find(c => c.slug === slug);

      if (!carrera) {
        document.body.innerHTML = "<h1>Carrera no encontrada</h1>";
      } else {

        const title = document.getElementById("carreraTitle");
        const desc = document.getElementById("carreraDesc");
        if (title.textContent.trim() === "Carrera") title.textContent = carrera.title;
        if (!desc.textContent.trim()) desc.textContent = carrera.description;

        const grid = document.getElementById("materiasGrid");

        if (!grid.querySelector(".card")) {
          grid.innerHTML = carrera.materias.map(m => `
            <a class="card" href="../materia/${m.slug}.html">
              <div class="card__body">
                <h3 class="card__title">${m.title}</h3>
                <p class="card__desc">${m.description}</p>
              </div>
            </a>
          `).join("");
        }

      }
    </script>

  </body>
</html>
